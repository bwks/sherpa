name = "integration-test"
ready_timeout = 300

[[nodes]]
name = "testbox"
model = "devbox_linux"
cpu_count = 8
memory = 16384
boot_disk_size = 100

environment_variables = [
  "GH_TOKEN=$GH_TOKEN",
  "CLAUDE_CODE_OAUTH_TOKEN=$CLAUDE_CODE_OAUTH_TOKEN",
]
text_files = [
  { src = "~/.claude.json", dst = "/home/sherpa/.claude.json", user = "sherpa", group = "sherpa", permissions = 600 },
]
