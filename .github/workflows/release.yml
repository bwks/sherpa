name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-app:
    name: Build ${{ matrix.binary }} (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: sherpa
            package: sherpa
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz

          - binary: sherpa
            package: sherpa
            target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz

          - binary: sherpa
            package: sherpa
            target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz

          - binary: sherpa
            package: sherpa
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip

          - binary: sherpad
            package: sherpad
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config

      - name: Build Tailwind CSS
        if: matrix.package == 'sherpad'
        run: bash scripts/tailwind-build.sh

      - name: Build
        run: cargo build --release -p ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.binary }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}.exe" -DestinationPath "${{ matrix.binary }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: ${{ matrix.binary }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ inputs.version }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Extract release notes
        id: release_notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ inputs.version }} --unreleased --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create changelog PR and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="changelog/${{ inputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up stale branch from a previous failed run
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for ${{ inputs.version }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(release): update changelog for ${{ inputs.version }}" \
            --body "Automated changelog update for release ${{ inputs.version }}." \
            --base main \
            --head "$BRANCH"

          # Merge directly if clean, otherwise enable auto-merge and wait
          if ! gh pr merge "$BRANCH" --merge; then
            gh pr merge "$BRANCH" --merge --auto

            for i in $(seq 1 30); do
              STATE=$(gh pr view "$BRANCH" --json state --jq '.state')
              if [ "$STATE" = "MERGED" ]; then
                echo "PR merged successfully."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Timed out waiting for PR to merge."
                exit 1
              fi
              sleep 10
            done
          fi

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout main
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          body: ${{ steps.release_notes.outputs.content }}
          files: artifacts/*
