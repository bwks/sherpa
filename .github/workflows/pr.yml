name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test-app:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config

      - name: Build Tailwind CSS
        run: bash scripts/tailwind-build.sh

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Generate coverage summary
        run: cargo llvm-cov report --summary-only 2>&1 | tee coverage-summary.txt

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
            const lines = summary.split('\n');
            const totalLine = lines.find(l => l.startsWith('TOTAL'));
            let coverageInfo = 'Coverage report generated.';
            if (totalLine) {
              const parts = totalLine.split(/\s+/).filter(Boolean);
              coverageInfo = `**Line coverage:** ${parts[3]} | **Function coverage:** ${parts[6]} | **Region coverage:** ${parts[9]}`;
            }
            const body = `## 📊 Test Coverage\n\n${coverageInfo}\n\n<details>\n<summary>Full Report</summary>\n\n\`\`\`\n${summary}\n\`\`\`\n\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## 📊 Test Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
